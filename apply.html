<!DOCTYPE html>
<html>
<head>
  <title>Apply</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="hire.html">Hire Tester</a>
  <a href="apply.html">Apply</a>
  <a href="https://discord.com" target="_blank">Contact</a>
</nav>

<header>
  <h1>Become a Tester</h1>
  <p>Applications are reviewed manually — duplicates will be ignored</p>
</header>

<div class="container">

  <form onsubmit="submitApp(event)">

    <input placeholder="Roblox Username" required><br>
    <input placeholder="Age (13+ required)" required><br>
    <input placeholder="Experience with testing?" required><br>
    <input placeholder="Games you tested before" required><br>
    <textarea placeholder="Why do you want to join?" required></textarea><br>

    <button class="btn" type="submit">Submit Application</button>

  </form>

</div>

<script>
function submitApp(e){
  e.preventDefault();
  alert("Application sent! Duplicate applications will be ignored.");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Apply</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="hire.html">Hire Tester</a>
  <a href="apply.html">Apply</a>
  <a href="login.html">Login</a>
</nav>

<header>
  <h1>Become a Tester</h1>
</header>

<div class="container">

  <form onsubmit="saveApp(event)">
    <input id="name" placeholder="Roblox Username"><br><br>
    <input id="exp" placeholder="Experience"><br><br>
    <input id="reason" placeholder="Why join?"><br><br>

    <button class="btn" type="submit">Submit</button>
  </form>

</div>

<script>
function saveApp(e) {
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    exp: document.getElementById("exp").value,
    reason: document.getElementById("reason").value
  };

  localStorage.setItem("application", JSON.stringify(data));

  alert("Application sent!");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Apply</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="hire.html">Hire Testers</a>
  <a href="apply.html">Apply</a>
</nav>

<header>
  <h1>Apply as Tester</h1>
</header>

<div class="section">

<form onsubmit="submitApp(event)">
  <input placeholder="Roblox Username" required><br>
  <input placeholder="Experience" required><br>
  <input placeholder="Games tested" required><br>
  <textarea placeholder="Why join?" required></textarea><br>

  <button class="btn">Submit</button>
</form>

</div>

<script>
function submitApp(e){
  e.preventDefault();
  alert("Application submitted. Duplicate apps ignored.");
}
</script>

</body>
</html>
<script type="module">
import { db } from "./firebase.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

window.submitApp = async function(e) {
  e.preventDefault();

  const inputs = document.querySelectorAll("input, textarea");

  await addDoc(collection(db, "applications"), {
    username: inputs[0].value,
    age: inputs[1].value,
    experience: inputs[2].value,
    games: inputs[3].value,
    reason: inputs[4].value,
    time: Date.now()
  });

  alert("Application submitted!");
};
</script>

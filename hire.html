<!DOCTYPE html>
<html>
<head>
  <title>Hire Testers</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="hire.html">Hire Testers</a>
  <a href="apply.html">Apply</a>
</nav>

<header>
  <h1>Pricing</h1>
</header>

<div class="section">

  <div class="grid">

    <div class="card">
      <h3>1 Week</h3>
      <p>Full testing coverage</p>
      <b>1,000 RBX</b>
    </div>

    <div class="card">
      <h3>2 Weeks</h3>
      <p>Extended QA testing</p>
      <b>1,500 RBX</b>
    </div>

    <div class="card">
      <h3>4 Weeks</h3>
      <p>Deep long-term testing</p>
      <b>2,500 RBX</b>
    </div>

    <div class="card">
      <h3>1 Month</h3>
      <p>Full continuous QA</p>
      <b>3,500 RBX</b>
    </div>

    <div class="card">
      <h3>Custom</h3>
      <p>100 RBX per day</p>

      <input id="days" placeholder="Enter days">

      <button class="btn" onclick="calc()">Calculate</button>

      <p id="result"></p>
    </div>

  </div>

</div>

<script>
function calc(){
  let days = document.getElementById("days").value;
  let cost = days * 100;
  document.getElementById("result").innerText = "Total: " + cost + " RBX";
}
</script>

</body>
</html>

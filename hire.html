<!DOCTYPE html>
<html>
<head>
  <title>Hire Tester</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Hire a Tester</h1>
  <p>Select a testing package</p>
</header>

<div class="container">

  <div class="card">
    <h2>Basic</h2>
    <p>1 day testing</p>
    <p>Bug report</p>
    <p>10 RBX</p>
    <button class="btn">Select</button>
  </div>

  <div class="card">
    <h2>Pro</h2>
    <p>3 days testing</p>
    <p>Full feedback</p>
    <p>25 RBX</p>
    <button class="btn">Select</button>
  </div>

  <div class="card">
    <h2>Premium</h2>
    <p>7 days testing</p>
    <p>Deep QA report</p>
    <p>50 RBX</p>
    <button class="btn">Select</button>
  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Hire Testers</title>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="hire.html">Hire</a>
  <a href="login.html">Login</a>
</nav>

<h1>Hire Testers</h1>

<div>
  <button onclick="book('1 Week',1000)">1 Week - 1000 RBX</button>
  <button onclick="book('2 Weeks',1500)">2 Weeks - 1500 RBX</button>
  <button onclick="book('4 Weeks',2500)">4 Weeks - 2500 RBX</button>
  <button onclick="book('1 Month',3500)">1 Month - 3500 RBX</button>
</div>

<br>

<h3>Custom</h3>
<input id="days" placeholder="Days">
<button onclick="calc()">Calculate</button>
<p id="result"></p>
<button onclick="bookCustom()">Buy Custom</button>

<script type="module">
import { auth, db } from "./firebase.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

window.book = async function(plan, price) {
  const user = auth.currentUser;

  if (!user) {
    alert("Please login first");
    location.href = "login.html";
    return;
  }

  await addDoc(collection(db, "orders"), {
    plan,
    price,
    email: user.email,
    status: "pending",
    time: Date.now()
  });

  alert("Booked!");
};

window.calc = function() {
  result.innerText = "Total: " + (days.value * 100) + " RBX";
};

window.bookCustom = async function() {
  const user = auth.currentUser;

  if (!user) {
    alert("Please login first");
    location.href = "login.html";
    return;
  }

  const price = days.value * 100;

  await addDoc(collection(db, "orders"), {
    plan: `Custom (${days.value} days)`,
    price,
    email: user.email,
    status: "pending",
    time: Date.now()
  });

  alert("Custom booked!");
};
</script>

</body>
</html>
